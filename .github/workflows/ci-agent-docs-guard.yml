name: Agent and Skill Docs Guard (.github)

on:
  push:
    branches: [main, master, 'swamy/**']
    paths:
      - '.github/copilot-instructions.md'
      - '.github/skills/**'
      - '.github/agents/**'
      - '.github/prompts/**'
      - '.github/rules/**'
      - '.github/workflows/ci-agent-docs-guard.yml'
  pull_request:
    branches: [main, master, 'swamy/**']
    paths:
      - '.github/copilot-instructions.md'
      - '.github/skills/**'
      - '.github/agents/**'
      - '.github/prompts/**'
      - '.github/rules/**'
      - '.github/workflows/ci-agent-docs-guard.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure required files exist
        run: |
          test -f .github/copilot-instructions.md
          test -f .github/skills/README.md
          test -d .github/skills
          test -d .github/agents
          test -d .github/workflows

      - name: Block stale cross-repo references
        run: |
          ! grep -R -n -E "t2-machine-learning|src/weekN|source-material/|\.cursor/|CLAUDE\.md|\.clinerules|\.opencode" .github --exclude-dir=workflows || (echo "Found stale imported references" && exit 1)

      - name: Lint markdown in .github
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 ".github/**/*.md"
