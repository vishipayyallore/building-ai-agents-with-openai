name: Skills Sanity (.github)

on:
  push:
    branches: [main, master, 'swamy/**']
    paths:
      - '.github/skills/**'
      - '.github/workflows/ci-skills-parity.yml'
  pull_request:
    branches: [main, master, 'swamy/**']
    paths:
      - '.github/skills/**'
      - '.github/workflows/ci-skills-parity.yml'
  workflow_dispatch:

jobs:
  skills-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill files exist
        run: |
          test -f .github/skills/README.md
          test -n "$(find .github/skills -name 'SKILL.md' -print -quit)"

      - name: Validate SKILL frontmatter fields
        run: |
          exit_code=0
          for f in $(find .github/skills -name 'SKILL.md'); do
            head -n 20 "$f" | grep -q "^---$" || { echo "Missing frontmatter marker: $f"; exit_code=1; }
            grep -q "^name:" "$f" || { echo "Missing name in frontmatter: $f"; exit_code=1; }
            grep -q "^description:" "$f" || { echo "Missing description in frontmatter: $f"; exit_code=1; }
          done
          exit $exit_code
