name: Python CI (Backend + MCP)

on:
  push:
    branches: [main, master, 'swamy/**']
  pull_request:
    branches: [main, master, 'swamy/**']

jobs:
  backend-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint (backend + MCP)
        run: uv run ruff check src/backend src/mcp-server

      - name: Run pytest
        run: uv run pytest -q
