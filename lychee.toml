# https://raw.githubusercontent.com/lycheeverse/lychee/master/lychee.example.toml
# Lychee link checker configuration
verbose = "info"
no_progress = true
max_retries = 2
retry_wait_time = 2
accept = ["200", "206", "429"]

# Timeouts
timeout = 20

exclude_path = [
  ".venv/**",
  ".github/**"
]

# Exclude patterns (examples)
exclude = [
  # Example flaky sites or local hosts
  "https://localhost",
  "http://localhost",
  "https://127.0.0.1",
  "http://127.0.0.1",
  # GitHub issue links may rate-limit during CI
  "^https://github\\.com/.*/issues/.*",
  # Decorative badges can be flaky for automated bots
  "^https://img\\.shields\\.io/.*",
  # Vite default favicon path isn't a valid absolute URI in file scans
  "^/vite\\.svg$"
]
