# Personal spike only — not curriculum. See SPIKE-002.
# Install: sudo cp nginx-agentic.conf /etc/nginx/sites-available/agentic
#          sudo ln -sf /etc/nginx/sites-available/agentic /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    root /opt/agentic/frontend-dist;
    index index.html;

    # React Router — /demo/level-1, /demo/level-2, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
